<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-F1BYJ154XM"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f2f2f7;
            --bg-secondary: #ffffff;
            --text-primary: #000000;
            --text-secondary: #8e8e93;
            --text-tertiary: #c7c7cc;
            --accent-blue: #007aff;
            --accent-gray: #8e8e93;
            --separator: rgba(60, 60, 67, 0.29);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #000000;
                --bg-secondary: #1c1c1e;
                --text-primary: #ffffff;
                --text-secondary: #8e8e93;
                --text-tertiary: #48484a;
                --separator: rgba(84, 84, 88, 0.65);
                --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
                --shadow-md: 0 4px 20px rgba(0,0,0,0.2);
                --shadow-lg: 0 8px 40px rgba(0,0,0,0.3);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景装饰 - 模拟相册中的照片散落效果 */
        .bg-photos {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .bg-photo {
            position: absolute;
            border-radius: 12px;
            background: linear-gradient(135deg, #e0e0e0 0%, #f0f0f0 100%);
            box-shadow: var(--shadow-md);
            opacity: 0;
            animation: floatIn 1s ease-out forwards;
        }

        .bg-photo:nth-child(1) {
            width: 120px;
            height: 160px;
            top: 10%;
            left: 10%;
            transform: rotate(-12deg);
            animation-delay: 0.1s;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
        }

        .bg-photo:nth-child(2) {
            width: 100px;
            height: 100px;
            top: 15%;
            right: 15%;
            transform: rotate(8deg);
            animation-delay: 0.2s;
            border-radius: 50%;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        .bg-photo:nth-child(3) {
            width: 140px;
            height: 100px;
            bottom: 20%;
            left: 8%;
            transform: rotate(5deg);
            animation-delay: 0.3s;
            background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%);
        }

        .bg-photo:nth-child(4) {
            width: 90px;
            height: 120px;
            bottom: 15%;
            right: 10%;
            transform: rotate(-6deg);
            animation-delay: 0.4s;
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
        }

        .bg-photo:nth-child(5) {
            width: 80px;
            height: 80px;
            top: 50%;
            left: 5%;
            transform: rotate(15deg);
            animation-delay: 0.5s;
            border-radius: 16px;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
        }

        .bg-photo:nth-child(6) {
            width: 110px;
            height: 80px;
            top: 8%;
            left: 50%;
            transform: rotate(-4deg) translateX(-50%);
            animation-delay: 0.15s;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9) rotate(var(--rot, 0deg));
            }
            100% {
                opacity: 0.15;
                transform: translateY(0) scale(1) rotate(var(--rot, 0deg));
            }
        }

        /* 主内容区 */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 24px;
            max-width: 420px;
            width: 100%;
        }

        /* 404 数字 - 相册堆叠效果 */
        .error-stack {
            position: relative;
            width: 200px;
            height: 160px;
            margin: 0 auto 40px;
        }

        .photo-card {
            position: absolute;
            width: 140px;
            height: 100px;
            border-radius: 12px;
            background: var(--bg-secondary);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: var(--text-tertiary);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .photo-card::before {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 4px;
            border-radius: 2px;
            background: var(--text-tertiary);
            opacity: 0.3;
        }

        .photo-card:nth-child(1) {
            top: 0;
            left: 30px;
            transform: rotate(-6deg);
            z-index: 3;
            color: var(--accent-blue);
        }

        .photo-card:nth-child(2) {
            top: 20px;
            left: 20px;
            transform: rotate(3deg);
            z-index: 2;
            opacity: 0.8;
        }

        .photo-card:nth-child(3) {
            top: 40px;
            left: 40px;
            transform: rotate(-2deg);
            z-index: 1;
            opacity: 0.6;
        }

        .error-stack:hover .photo-card:nth-child(1) {
            transform: rotate(-12deg) translateY(-10px);
        }

        .error-stack:hover .photo-card:nth-child(2) {
            transform: rotate(8deg) translateY(-5px);
        }

        .error-stack:hover .photo-card:nth-child(3) {
            transform: rotate(-6deg) translateY(5px);
        }

        /* 标题 */
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.021em;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 17px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* 按钮组 - iOS 风格 */
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            outline: none;
            -webkit-appearance: none;
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .btn:active::after {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        .btn-primary:hover {
            background: #0051d5;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--accent-blue);
            border: 1px solid var(--separator);
        }

        .btn-secondary:hover {
            background: rgba(0, 122, 255, 0.05);
        }

        /* 底部信息 */
        .footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 1;
        }

        .footer p {
            font-size: 13px;
            color: var(--text-tertiary);
            font-weight: 400;
        }

        /* 搜索建议 */
        .suggestions {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--separator);
            text-align: left;
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.8s forwards;
        }

        .suggestions-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .suggestion-list {
            list-style: none;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--separator);
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            opacity: 0.7;
        }

        .suggestion-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 18px;
            box-shadow: var(--shadow-sm);
        }

        .suggestion-text {
            flex: 1;
        }

        .suggestion-label {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .suggestion-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chevron {
            width: 20px;
            height: 20px;
            color: var(--text-tertiary);
            opacity: 0.6;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 入场动画 */
        .animate-in {
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        /* 响应式 */
        @media (max-width: 480px) {
            .error-stack {
                transform: scale(0.85);
            }
            
            h1 {
                font-size: 24px;
            }
            
            .subtitle {
                font-size: 15px;
            }
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰照片 -->
    <div class="bg-photos" aria-hidden="true">
        <div class="bg-photo"></div>
        <div class="bg-photo"></div>
        <div class="bg-photo"></div>
        <div class="bg-photo"></div>
        <div class="bg-photo"></div>
        <div class="bg-photo"></div>
    </div>

    <div class="container">
        <!-- 404 相册堆叠 -->
        <div class="error-stack animate-in delay-1" aria-label="404 错误">
            <div class="photo-card">4</div>
            <div class="photo-card">0</div>
            <div class="photo-card">4</div>
        </div>

        <!-- 文字内容 -->
        <h1 class="animate-in delay-2">页面未找到</h1>
        <p class="subtitle animate-in delay-2">
            这张照片似乎不在相册中。<br>
            它可能被移动、删除，或从未存在过。
        </p>

        <!-- 操作按钮 -->
        <div class="actions animate-in delay-3">
            <a href="/" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                返回相册首页
            </a>
            <button onclick="history.back()" class="btn btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                返回上一页
            </button>
        </div>

        <!-- 快捷导航建议 -->
        <div class="suggestions">
            <div class="suggestions-title">你可能想去</div>
            <ul class="suggestion-list">
                <li class="suggestion-item" onclick="window.location.href='/'">
                    <div class="suggestion-icon">🏠</div>
                    <div class="suggestion-text">
                        <div class="suggestion-label">相册首页</div>
                        <div class="suggestion-desc">浏览所有照片</div>
                    </div>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </li>
                <li class="suggestion-item" onclick="window.location.href='/?search='">
                    <div class="suggestion-icon">🔍</div>
                    <div class="suggestion-text">
                        <div class="suggestion-label">搜索照片</div>
                        <div class="suggestion-desc">查找特定内容</div>
                    </div>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </li>
            </ul>
        </div>
    </div>

    <div class="footer">
        <p>BeautifulAlbum</p>
    </div>

    <script>
        // 添加微妙的鼠标视差效果
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.photo-card');
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            
            cards.forEach((card, index) => {
                const factor = (index + 1) * 0.5;
                const currentTransform = card.style.transform || getComputedStyle(card).transform;
                card.style.transform = `translate(${x * factor}px, ${y * factor}px) rotate(${[-6, 3, -2][index]}deg)`;
            });
        });

        // 检测系统主题变化
        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                // CSS 变量会自动更新，无需额外操作
            });
        }
    </script>
</body>
</html>
